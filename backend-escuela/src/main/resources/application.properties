spring.application.name=backend-escuela

# ===============================
# CONFIGURACIÓN BASE DE DATOS
# ===============================
# ⚠️ IMPORTANTE:
# Reemplazá estos valores con los de TU MySQL local

spring.datasource.url=jdbc:mysql://localhost:3306/db-escuela
# 👉 Cambiá "db-escuela" por el nombre de tu base de datos si es distinto

spring.datasource.username=TU_USURNAME
# 👉 Ejemplo: root

spring.datasource.password=TU_PASSWORD
# 👉 Ejemplo: root o la que tengas configurada

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
# 👉 "update" crea/actualiza tablas automáticamente

# ===============================
# LOGS (OPCIONAL)
# ===============================
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# 👉 Muestra las queries en consola